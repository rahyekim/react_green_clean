<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <title>Operators</title>
</head>
<body>
    <div class="container">
        <div class="row">
            <div class="col-md-12">
                <div class="mt-4 mb-2">자바스크립트 연산자(Operators)
                    <pre>
                       = 할당 연산자는 값을 할당
                       + 덧셈 연산자는 값을 더함
                       * 곱셈 연산자는 값을 곱함
                      >= 비교 연산자는 값을 비교
                    </pre>
                <h1 class="mt-4 mb-2">할당연산자</h1>
                    +=<mark id="operator1">입니다</mark> 더해서 대입
                    -=<mark id="operator2">입니다</mark> 빼서 대입
                    *=<mark id="operator3">입니다</mark> 곱해서 대입
                    %=<mark id="operator4">입니다</mark> 나머지 대입
                    **=<mark id="operator5">입니다</mark> 제곱해서 대입
                    ++ 증가[증분]<mark id="operator6"></mark> 
                    --감소<mark id="operator7"></mark><br/>

                </div>
            </div>
        </div>
    </div>
    <script src="js/operator.js"></script>
</body>
</html>
